name: Tomato Crop ML - CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci-cd-pipeline:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          flake8 src/ --max-line-length=120 --select=E9,F63,F7,F82

      - name: Set CI training config
        run: |
          sed -i 's/EPOCHS = 30/EPOCHS = 3/' src/config.py
          sed -i 's/MIN_ACCURACY = 0.70/MIN_ACCURACY = 0.10/' src/config.py

      - name: Create sample dataset for CI
        run: |
          python - <<'EOF'
          import os
          import numpy as np
          from PIL import Image
          classes = ["Seedling", "Vegetative", "Flowering", "Fruiting"]
          os.makedirs("data", exist_ok=True)
          for cls in classes:
              os.makedirs(f"data/{cls}", exist_ok=True)
              for i in range(10):
                  img = Image.fromarray(
                      np.random.randint(0, 255, (224, 224, 3), dtype=np.uint8)
                  )
                  img.save(f"data/{cls}/img_{i}.jpg")
          print("Sample dataset created - 4 classes x 10 images")
          EOF

      - name: Train model
        run: python src/train.py

      - name: Run tests
        run: pytest tests/ -v

      - name: Evaluate model
        run: python src/evaluate.py

      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tomato-model-artifacts
          path: outputs/

      - name: Deploy to Hugging Face
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO_ID: ${{ secrets.HF_REPO_ID }}
        run: python src/deploy.py